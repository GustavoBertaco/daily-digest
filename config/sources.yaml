# Daily Digest — Source Configuration
# =====================================
# Add or remove areas freely. Each area becomes its own .md file per day.
# Supported source types: rss, podcast, youtube, website, newsletter
#
# newsletter — a kill-the-newsletter Atom feed of forwarded emails. UNTRUSTED: the
#   email body is used only to harvest article links (never summarized). Requires a
#   `senders` allowlist; only emails from those addresses are processed, and each
#   linked article is fetched/summarized like a `website` source.
#
# Per-area summary_style (optional, default "insight"):
#   insight — framing paragraph + 3-5 practitioner insight bullets, drafted from
#             the live article. Use for analytical/long-form sources.
#   brief   — current 2-3 sentence factual summary from the snippet. Use for
#             launch/release feeds (Providers Updates) where the fact is the point.

settings:
  max_age_hours: 26           # Only include items published in the last N hours (+2h buffer for schedule jitter)
  max_age_hours_by_type:      # Per-type defaults for infrequent publishers (per-source max_age_hours wins)
    youtube: 80               # most channels post 2-3x/week
    podcast: 180              # weekly shows + buffer
  max_items_per_source: 10    # Cap items per source to avoid flooding the digest
  request_timeout_seconds: 10
  user_agent: "daily-digest/1.0 (personal aggregator)"

areas:

  - name: "Technology"
    emoji: "💻"
    folder: "Tech"
    tags: [digest, technology, software]
    sources:
      - type: youtube
        channel_id: "UCPbwhExawYrn9xxI21TFfyw"
        name: "The Pragmatic Engineer"
      - type: rss
        url: "https://netflixtechblog.com/feed"
        name: "Netflix Tech Blog"
        max_age_hours: 180    # publishes ~weekly
      - type: rss
        url: "https://medium.com/feed/airbnb-engineering"
        name: "Airbnb Tech"
        max_age_hours: 180    # publishes ~weekly
      - type: rss
        url: "https://engineering.fb.com/feed/"
        name: "Meta Engineering"
        max_age_hours: 180    # publishes ~weekly
      - type: website
        url: "https://eng.uber.com/"
        name: "Uber Engineering"

