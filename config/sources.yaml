        channel_id: "UCPbwhExawYrn9xxI21TFfyw"
        name: "The Pragmatic Engineer"

  - name: "Finance & Markets"
    emoji: "📈"
    folder: "Finance"
    tags: [digest, finance, markets, investing]
    sources: []

  - name: "AI & Machine Learning"
    emoji: "🤖"
