name: Secret scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so the scan covers past commits too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Free for personal/public repos; GITLEAKS_LICENSE is only required for orgs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
