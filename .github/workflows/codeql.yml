name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan (Mondays 06:00 UTC) so newly-published rules catch old code.
    - cron: '0 6 * * 1'

# Least privilege: CodeQL only needs to read code and write security alerts.
permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # 'security-extended' adds higher-recall security queries beyond the default.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
